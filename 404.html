<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost the trail — Sourdough Social Club</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Courier+Prime&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root{--paper:#F0E6D0;--ink:#171310;--red:#C12E1C;--gold:#C99A2E;--blue:#1B2D52;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Courier Prime',monospace;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;}
.rasta{position:fixed;top:0;left:0;width:100%;height:6px;background:linear-gradient(90deg,#1C7A42 0 33.3%,var(--gold) 33.3% 66.6%,var(--red) 66.6%);}
.code{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(80px,20vw,200px);line-height:.8;color:var(--blue);text-shadow:5px 6px 0 var(--red);}
h1{font-family:'Oswald',sans-serif;font-weight:700;text-transform:uppercase;font-size:clamp(24px,5vw,40px);margin-top:18px;}
p{max-width:420px;line-height:1.8;margin-top:14px;font-size:14px;}
.marker{font-family:'Permanent Marker',cursive;color:var(--red);font-size:18px;}
a.btn{margin-top:30px;display:inline-block;font-family:'Oswald',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:14px;background:var(--red);color:var(--paper);text-decoration:none;padding:14px 26px;border:2px solid var(--ink);box-shadow:5px 5px 0 var(--ink);transition:.12s;}
a.btn:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 var(--gold);}
</style>
</head>
<body>
<div class="rasta"></div>
<div class="code">404</div>
<h1>Lost The Trail</h1>
<p>This page wandered off the route. The dough, however, has not. <span class="marker">find us &amp; eat.</span></p>
<a class="btn" href="/">Back To The Route</a>
</body>
</html>
